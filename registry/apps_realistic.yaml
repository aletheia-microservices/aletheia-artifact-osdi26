build_tag: "eval && realistic && !synthetic_small && !synthetic_medium && !synthetic_large"

apps:
  - name: postnotification
    package_path: postnotification/workflow/postnotification
    spec_name: postnotification_docker
    spec_path: github.com/blueprint-uservices/blueprint/examples/postnotification/wiring/specs

  - name: digota
    package_path: digota/workflow/digota
    spec_name: digota_docker
    spec_path: github.com/blueprint-uservices/blueprint/examples/digota/wiring/specs

  - name: eshopmicroservices
    package_path: eshopmicroservices/workflow/eshopmicroservices
    spec_name: eshopmicroservices_docker
    spec_path: github.com/blueprint-uservices/blueprint/examples/eshopmicroservices/wiring/specs

  - name: dsb_mediamicroservices
    package_path: dsb_mediamicroservices/workflow/mediamicroservices
    spec_name: dsb_mediamicroservices_docker
    spec_path: github.com/blueprint-uservices/blueprint/examples/dsb_mediamicroservices/wiring/specs
    nosql_path: blueprint/examples/dsb_mediamicroservices/workflow/mediamicroservices

  - name: sockshop
    package_path: sockshop/workflow/sockshop
    spec_name: sockshop_docker
    spec_path: github.com/blueprint-uservices/blueprint/examples/sockshop/wiring/specs

  - name: dsb_socialnetwork
    package_path: dsb_socialnetwork/workflow/socialnetwork
    spec_name: dsb_socialnetwork_docker
    spec_path: github.com/blueprint-uservices/blueprint/examples/dsb_socialnetwork/wiring/specs

  - name: trainticket
    package_path: trainticket/workflow/trainticket
    spec_name: trainticket_docker
    spec_path: github.com/blueprint-uservices/blueprint/examples/trainticket/wiring/specs
